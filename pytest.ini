[pytest]
minversion = 6.0
addopts = -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests

# Test paths
testpaths = tests

# Timeout for slow tests
timeout = 30

# Use coverage if available
# addopts = --cov=rompiche --cov-report=term-missing

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning